services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT

    ports:
      - "${BACKEND_HOST_PORT:-3210}:3210"
      - "${SITE_PROXY_HOST_PORT:-3211}:3211"

    volumes:
      - convex-data:/convex/data

    environment:
      # Variables visibles/editables en Coolify para cambiar puertos locales
      - BACKEND_HOST_PORT=${BACKEND_HOST_PORT:-3210}
      - SITE_PROXY_HOST_PORT=${SITE_PROXY_HOST_PORT:-3211}

      # URLs públicas/proxy generadas por Coolify. No las uses para
      # CONVEX_CLOUD_ORIGIN: Coolify puede generarlas sin puerto.
      - SERVICE_URL_BACKEND_3210
      - SERVICE_URL_SITE_3211

      # Convex backend
      - APPLICATION_MAX_CONCURRENT_MUTATIONS=${APPLICATION_MAX_CONCURRENT_MUTATIONS:-16}
      - APPLICATION_MAX_CONCURRENT_NODE_ACTIONS=${APPLICATION_MAX_CONCURRENT_NODE_ACTIONS:-16}
      - APPLICATION_MAX_CONCURRENT_QUERIES=${APPLICATION_MAX_CONCURRENT_QUERIES:-16}
      - APPLICATION_MAX_CONCURRENT_V8_ACTIONS=${APPLICATION_MAX_CONCURRENT_V8_ACTIONS:-16}

      - INSTANCE_NAME=${INSTANCE_NAME:-convex-instance}
      - INSTANCE_SECRET=${SERVICE_HEX_32_SECRET}

      # URLs internas que usa el backend Convex para llamarse a sí mismo.
      # Deben apuntar al puerto dentro del mismo contenedor, no a la URL
      # pública de Coolify, para evitar que Coolify las sobreescriba sin puerto.
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}

      - RUST_LOG=${RUST_LOG:-info}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - DO_NOT_REQUIRE_SSL=${DO_NOT_REQUIRE_SSL:-true}
      - DISABLE_BEACON=${DISABLE_BEACON:-true}
      - DISABLE_METRICS_ENDPOINT=${DISABLE_METRICS_ENDPOINT:-true}
      - DOCUMENT_RETENTION_DELAY=${DOCUMENT_RETENTION_DELAY:-172800}
      - ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-300}
      - HTTP_SERVER_TIMEOUT_SECONDS=${HTTP_SERVER_TIMEOUT_SECONDS:-300}
      - REDACT_LOGS_TO_CLIENT=${REDACT_LOGS_TO_CLIENT:-false}

      - DATABASE_URL=${DATABASE_URL:-}
      - POSTGRES_URL=${POSTGRES_URL:-}
      - MYSQL_URL=${MYSQL_URL:-}

      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_STORAGE_FILES_BUCKET=${S3_STORAGE_FILES_BUCKET:-}
      - S3_STORAGE_MODULES_BUCKET=${S3_STORAGE_MODULES_BUCKET:-}
      - S3_STORAGE_SEARCH_BUCKET=${S3_STORAGE_SEARCH_BUCKET:-}
      - S3_STORAGE_EXPORTS_BUCKET=${S3_STORAGE_EXPORTS_BUCKET:-}
      - S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET=${S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET:-}
      - AWS_S3_DISABLE_CHECKSUMS=${AWS_S3_DISABLE_CHECKSUMS:-}
      - AWS_S3_DISABLE_SSE=${AWS_S3_DISABLE_SSE:-}
      - AWS_S3_FORCE_PATH_STYLE=${AWS_S3_FORCE_PATH_STYLE:-}

      - CONVEX_RELEASE_VERSION_DEV=${CONVEX_RELEASE_VERSION_DEV:-}

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3210/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT

    ports:
      - "${DASHBOARD_HOST_PORT:-6791}:6791"

    environment:
      # Variable visible/editable en Coolify para cambiar puerto local del dashboard
      - DASHBOARD_HOST_PORT=${DASHBOARD_HOST_PORT:-6791}

      # URL pública/proxy generada por Coolify
      - SERVICE_URL_DASHBOARD_6791

      # URL pública que usa el navegador para hablar con Convex API.
      # Configura PUBLIC_BACKEND_URL en Coolify si expones otro host/puerto.
      - NEXT_PUBLIC_DEPLOYMENT_URL=${PUBLIC_BACKEND_URL:-http://localhost:3210}

      - NEXT_PUBLIC_LOAD_MONACO_INTERNALLY=${NEXT_PUBLIC_LOAD_MONACO_INTERNALLY:-false}

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:6791/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 30s

volumes:
  convex-data:
    name: ${CONVEX_DATA_VOLUME:-convex-data}
    driver: local
