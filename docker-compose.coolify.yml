# Docker Compose para Coolify - Convex Self-Hosted
# Las variables SERVICE_URL_* y SERVICE_FQDN_* son proporcionadas automáticamente por Coolify

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    volumes:
      - convex-data:/convex/data
    environment:
      # === CONFIGURACIÓN BÁSICA (REQUERIDAS) ===
      - INSTANCE_NAME=${INSTANCE_NAME:-convex-instance}
      # ⚠️ IMPORTANTE: Configura INSTANCE_SECRET en Coolify con un valor generado
      # Genera con: openssl rand -hex 32
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      
      # === URLs (Usando variables automáticas de Coolify) ===
      # SERVICE_URL_BACKEND es proporcionado automáticamente por Coolify
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:-${SERVICE_URL_BACKEND:-http://localhost:3210}}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-${SERVICE_URL_BACKEND:-http://localhost:3211}}
      
      # === CONFIGURACIÓN DE COMPORTAMIENTO ===
      - RUST_LOG=${RUST_LOG:-info}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - DO_NOT_REQUIRE_SSL=${DO_NOT_REQUIRE_SSL:-true}
      - DISABLE_BEACON=${DISABLE_BEACON:-true}
      - DOCUMENT_RETENTION_DELAY=${DOCUMENT_RETENTION_DELAY:-172800}
      - ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-300}
      - HTTP_SERVER_TIMEOUT_SECONDS=${HTTP_SERVER_TIMEOUT_SECONDS:-300}
      - REDACT_LOGS_TO_CLIENT=${REDACT_LOGS_TO_CLIENT:-false}
      
      # === BASE DE DATOS (Opcional) ===
      - DATABASE_URL=${DATABASE_URL:-}
      - POSTGRES_URL=${POSTGRES_URL:-}
      - MYSQL_URL=${MYSQL_URL:-}
      
      # === S3 STORAGE (Opcional) ===
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_STORAGE_FILES_BUCKET=${S3_STORAGE_FILES_BUCKET:-}
      - S3_STORAGE_MODULES_BUCKET=${S3_STORAGE_MODULES_BUCKET:-}
      - S3_STORAGE_SEARCH_BUCKET=${S3_STORAGE_SEARCH_BUCKET:-}
      - S3_STORAGE_EXPORTS_BUCKET=${S3_STORAGE_EXPORTS_BUCKET:-}
      - S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET=${S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET:-}
      - AWS_S3_DISABLE_CHECKSUMS=${AWS_S3_DISABLE_CHECKSUMS:-}
      - AWS_S3_DISABLE_SSE=${AWS_S3_DISABLE_SSE:-}
      - AWS_S3_FORCE_PATH_STYLE=${AWS_S3_FORCE_PATH_STYLE:-}
      
      # === AVANZADO ===
      - CONVEX_RELEASE_VERSION_DEV=${CONVEX_RELEASE_VERSION_DEV:-}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    
    labels:
      - "coolify.managed=true"

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      # URL del backend (usando variable automática de Coolify)
      - NEXT_PUBLIC_DEPLOYMENT_URL=${NEXT_PUBLIC_DEPLOYMENT_URL:-${SERVICE_URL_BACKEND:-http://localhost:3210}}
      - NEXT_PUBLIC_LOAD_MONACO_INTERNALLY=${NEXT_PUBLIC_LOAD_MONACO_INTERNALLY:-true}
    depends_on:
      backend:
        condition: service_healthy
    
    labels:
      - "coolify.managed=true"

volumes:
  convex-data:
    driver: local
